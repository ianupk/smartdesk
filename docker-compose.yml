services:
    smartdesk:
        build:
            context: .
            dockerfile: Dockerfile.dev
        container_name: smartdesk-dev
        ports:
            - "3000:3000"
        volumes:
            - .:/app
            # Preserve node_modules generated inside container — never overwrite with host
            - node_modules:/app/node_modules
        env_file:
            - .env.local
        environment:
            # Hardcoded — always overrides .env.local
            DATABASE_URL: "postgresql://smartdesk:smartdesk_secret@postgres:5432/smartdesk"
            # Do NOT set PRISMA_QUERY_ENGINE_LIBRARY — let Prisma detect the correct binary
        depends_on:
            postgres:
                condition: service_healthy
        restart: unless-stopped

    postgres:
        image: postgres:16-alpine
        container_name: smartdesk-db-dev
        environment:
            POSTGRES_DB: smartdesk
            POSTGRES_USER: smartdesk
            POSTGRES_PASSWORD: smartdesk_secret
        ports:
            - "5432:5432"
        volumes:
            - pgdata_dev:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U smartdesk"]
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped

volumes:
    pgdata_dev:
    node_modules:
